# 1. We removed the "user" directive so it runs safely as non-root
worker_processes auto;

# 2. Move the Process ID file to a folder we are allowed to write in
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 3. CRITICAL FIX: Move all cache and temp files to the writable /tmp/ directory
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp_path;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    server {
        # 4. Listen on port 8080 (Non-root users cannot use port 80)
        listen 8080;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # 5. This makes sure your React/Vite router works and doesn't throw 404 errors
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}