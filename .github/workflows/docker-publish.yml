name: Build and Publish Docker Image

# This tells GitHub to run this script ONLY when you push to the main branch
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. GitHub downloads your code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. GitHub sets up advanced Docker building tools
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. GitHub securely logs into your Docker Hub account
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. GitHub builds the image, bakes in your keys, and pushes it!
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/vito-ginglies:latest
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}