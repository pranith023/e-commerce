name: Auto Build and Push Docker Image

# This tells the pipeline to run ONLY when you push code to the main branch
on:
  push:
    branches: [ "main" ] # Change this to "master" if your default branch is called master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Grab your latest code from GitHub
      - name: Check out repository
        uses: actions/checkout@v4

      # 2. Log in to Docker Hub using your hidden secrets
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Automatically run 'docker build' and 'docker push'
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Replace 'vito-ginglies' with your actual Docker Hub repository name if it's different
          tags: ${{ secrets.pranith023 }}/vito-ginglies:latest